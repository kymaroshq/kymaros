{{- if .Values.installCRDs }}
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: restoretests.restore.kymaros.io
spec:
  group: restore.kymaros.io
  names:
    kind: RestoreTest
    listKind: RestoreTestList
    plural: restoretests
    shortNames:
    - rt
    singular: restoretest
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.lastScore
      name: Score
      type: integer
    - jsonPath: .status.lastResult
      name: Result
      type: string
    - jsonPath: .status.lastRunAt
      name: Last Run
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: RestoreTest is the Schema for the restoretests API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RestoreTestSpec defines the desired state of RestoreTest
            properties:
              backupSource:
                description: BackupSource defines which backup to test
                properties:
                  backupName:
                    description: 'BackupName: specific name or "latest"'
                    type: string
                  labelSelector:
                    additionalProperties:
                      type: string
                    description: LabelSelector to filter resources (optional)
                    type: object
                  namespaces:
                    description: Namespaces to restore (supports multi-namespace restore
                      groups)
                    items:
                      description: NamespaceMapping maps a source namespace to an
                        optional sandbox name
                      properties:
                        name:
                          description: Name of the source namespace
                          type: string
                        sandboxName:
                          description: SandboxName override for the sandbox namespace
                            (optional)
                          type: string
                      required:
                      - name
                      type: object
                    type: array
                  provider:
                    description: 'Provider: velero'
                    enum:
                    - velero
                    type: string
                required:
                - backupName
                - namespaces
                - provider
                type: object
              healthChecks:
                description: HealthChecks references a HealthCheckPolicy
                properties:
                  policyRef:
                    description: PolicyRef references a HealthCheckPolicy by name
                    type: string
                  timeout:
                    description: Timeout for all checks combined
                    type: string
                type: object
              historyLimit:
                default: 10
                description: HistoryLimit is the maximum number of RestoreReports
                  to keep per test.
                format: int32
                minimum: 1
                type: integer
              logCollection:
                description: LogCollection configures pod log collection in the sandbox
                properties:
                  enabled:
                    default: true
                    description: 'Enabled controls whether logs are collected (default:
                      true)'
                    type: boolean
                  includeEvents:
                    default: true
                    description: 'IncludeEvents controls whether K8s events are collected
                      (default: true)'
                    type: boolean
                  includeInit:
                    default: true
                    description: 'IncludeInit controls whether init container logs
                      are collected (default: true)'
                    type: boolean
                  includePrevious:
                    default: true
                    description: 'IncludePrevious controls whether previous (crashed)
                      container logs are collected (default: true)'
                    type: boolean
                  maxLines:
                    default: 100
                    description: 'MaxLines is the maximum number of log lines per
                      container (default: 100)'
                    maximum: 1000
                    minimum: 10
                    type: integer
                type: object
              notifications:
                description: Notifications channels
                properties:
                  onFailure:
                    items:
                      description: NotificationChannel defines a single notification
                        target
                      properties:
                        channel:
                          description: Channel (for Slack)
                          type: string
                        type:
                          description: 'Type: slack | webhook'
                          enum:
                          - slack
                          - webhook
                          type: string
                        webhookSecretRef:
                          description: WebhookSecretRef references a Secret containing
                            the webhook URL
                          type: string
                      required:
                      - type
                      type: object
                    type: array
                  onSuccess:
                    items:
                      description: NotificationChannel defines a single notification
                        target
                      properties:
                        channel:
                          description: Channel (for Slack)
                          type: string
                        type:
                          description: 'Type: slack | webhook'
                          enum:
                          - slack
                          - webhook
                          type: string
                        webhookSecretRef:
                          description: WebhookSecretRef references a Secret containing
                            the webhook URL
                          type: string
                      required:
                      - type
                      type: object
                    type: array
                type: object
              sandbox:
                description: Sandbox configuration
                properties:
                  namespacePrefix:
                    default: rp-test
                    description: 'NamespacePrefix for sandbox namespaces (default:
                      "rp-test")'
                    type: string
                  networkIsolation:
                    default: strict
                    description: 'NetworkIsolation mode: "strict" (deny-all) | "group"
                      (allow intra-group)'
                    enum:
                    - strict
                    - group
                    type: string
                  resourceQuota:
                    description: ResourceQuota limits
                    properties:
                      cpu:
                        type: string
                      memory:
                        type: string
                      storage:
                        type: string
                    type: object
                  ttl:
                    description: 'TTL before forced cleanup (default: 30m)'
                    type: string
                type: object
              schedule:
                description: Schedule defines when to run (cron format)
                properties:
                  cron:
                    description: Cron expression
                    type: string
                  timezone:
                    description: 'Timezone (default: UTC)'
                    type: string
                required:
                - cron
                type: object
              sla:
                description: SLA targets
                properties:
                  alertOnExceed:
                    description: AlertOnExceed triggers alert if measured RTO > MaxRTO
                    type: boolean
                  maxRTO:
                    description: MaxRTO is the declared RTO target
                    type: string
                required:
                - maxRTO
                type: object
              timeout:
                description: |-
                  Timeout is the global timeout for the entire test run (sandbox creation through health checks).
                  If the timeout expires, the test is marked as Failed.
                  If not set, no global timeout is applied.
                type: string
            required:
            - backupSource
            - sandbox
            - schedule
            type: object
          status:
            description: RestoreTestStatus defines the observed state of RestoreTest.
            properties:
              conditions:
                description: Conditions standard K8s conditions
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastReportRef:
                description: LastReportRef name of the most recent RestoreReport
                type: string
              lastResult:
                description: 'LastResult: pass | fail | partial'
                type: string
              lastRunAt:
                description: LastRunAt timestamp of last execution
                format: date-time
                type: string
              lastScore:
                description: LastScore from the most recent RestoreReport
                type: integer
              nextRunAt:
                description: NextRunAt calculated next execution time
                format: date-time
                type: string
              phase:
                description: 'Phase: Idle | Running | Completed | Failed'
                enum:
                - Idle
                - Running
                - Completed
                - Failed
                type: string
              restoreID:
                description: RestoreID is the current Velero Restore CR name (first,
                  for backward compat)
                type: string
              restoreIDs:
                description: RestoreIDs tracks all Velero Restore CR names for multi-namespace
                  restores
                items:
                  type: string
                type: array
              sandboxNamespace:
                description: SandboxNamespace is the current sandbox namespace (first,
                  for backward compat)
                type: string
              sandboxNamespaces:
                description: SandboxNamespaces tracks all sandbox namespaces for multi-namespace
                  restores
                items:
                  type: string
                type: array
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
