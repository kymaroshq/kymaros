{{- if .Values.api.enabled -}}
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "kymaros.fullname" . }}-test-connection
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "kymaros.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: wget
      image: busybox:1.36
      imagePullPolicy: IfNotPresent
      command:
        - wget
        - --spider
        - --timeout=10
        - "http://{{ include "kymaros.fullname" . }}-api:{{ .Values.api.port }}/api/v1/health"
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault
{{- end }}
