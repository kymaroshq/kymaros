{{- if and .Values.rbac.create .Values.api.enabled -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kymaros.fullname" . }}-api-reader
  labels:
    {{- include "kymaros.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kymaros.fullname" . }}-api-reader
subjects:
- kind: ServiceAccount
  name: {{ include "kymaros.apiServiceAccountName" . }}
  namespace: {{ .Release.Namespace }}
{{- end }}
