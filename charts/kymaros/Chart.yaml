apiVersion: v2
name: kymaros
description: Kubernetes operator that validates backup restorability continuously — automated restore testing with scoring, health checks, and SLA compliance tracking.
type: application
version: 0.6.1
appVersion: "0.6.1"
home: https://kymaros.io
sources:
  - https://github.com/kymaroshq/kymaros
icon: https://kymaros.io/logo.svg
keywords:
  - kubernetes
  - backup
  - velero
  - disaster-recovery
  - restore
  - validation
  - operator
  - compliance
  - sre
  - helm
  - prometheus
  - soc2
maintainers:
  - name: kymaroshq
    url: https://github.com/kymaroshq
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "true"
  artifacthub.io/category: security
  artifacthub.io/operatorCapabilities: Full Lifecycle
  artifacthub.io/links: |
    - name: Documentation
      url: https://docs.kymaros.io
    - name: Website
      url: https://kymaros.io
  artifacthub.io/screenshots: |
    - title: Dashboard Overview
      url: https://kymaros.io/screenshots/dashboard-overview.png
    - title: Report Detail
      url: https://kymaros.io/screenshots/report-detail.png
  artifacthub.io/changes: |
    - kind: added
      description: Pod logs collection from sandbox namespaces
    - kind: added
      description: Kubernetes events capture in RestoreReport
    - kind: added
      description: Configurable log collection (maxLines, init, previous containers)
    - kind: added
      description: GET /api/v1/reports/{name}/logs endpoint
    - kind: added
      description: Pod logs viewer in dashboard with expandable log cards
