apiVersion: v2
name: kymaros
description: Kubernetes operator that validates backup restorability continuously — automated restore testing with scoring, health checks, and SLA compliance tracking.
type: application
version: 0.6.2
appVersion: "0.6.2"
home: https://kymaros.io
sources:
  - https://github.com/kymaroshq/kymaros
icon: https://kymaros.io/logo.svg
keywords:
  - kubernetes
  - backup
  - velero
  - disaster-recovery
  - restore
  - validation
  - operator
  - compliance
  - sre
  - helm
  - prometheus
  - soc2
maintainers:
  - name: kymaroshq
    url: https://github.com/kymaroshq
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "true"
  artifacthub.io/category: security
  artifacthub.io/operatorCapabilities: Full Lifecycle
  artifacthub.io/links: |
    - name: Documentation
      url: https://docs.kymaros.io
    - name: Website
      url: https://kymaros.io
  artifacthub.io/screenshots: |
    - title: Dashboard Overview
      url: https://kymaros.io/screenshots/dashboard-overview.png
    - title: Report Detail
      url: https://kymaros.io/screenshots/report-detail.png
  artifacthub.io/changes: |
    - kind: added
      description: Settings page with cluster info, provider status, notifications, sandbox config, metrics
    - kind: added
      description: Enriched GET /api/v1/health with version, K8s version, uptime, pod name
    - kind: added
      description: Five new /api/v1/config/* endpoints (provider, notifications, sandbox, cleanup)
    - kind: added
      description: Version injection via ldflags at build time
    - kind: fixed
      description: Float display bug in dashboard score delta and chart tooltip
    - kind: fixed
      description: Binary path /manager to /kymaros in kustomize manifest for e2e tests
