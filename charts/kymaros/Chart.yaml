apiVersion: v2
name: kymaros
description: Kubernetes operator that validates backup restorability continuously — automated restore testing with scoring, health checks, and SLA compliance tracking.
type: application
version: 0.6.5
appVersion: "0.6.5"
home: https://kymaros.io
sources:
  - https://github.com/kymaroshq/kymaros
icon: https://kymaros.io/logo.svg
keywords:
  - kubernetes
  - backup
  - velero
  - disaster-recovery
  - restore
  - validation
  - operator
  - compliance
  - sre
  - helm
  - prometheus
  - soc2
maintainers:
  - name: kymaroshq
    url: https://github.com/kymaroshq
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/operator: "true"
  artifacthub.io/category: security
  artifacthub.io/operatorCapabilities: Full Lifecycle
  artifacthub.io/links: |
    - name: Documentation
      url: https://docs.kymaros.io
    - name: Website
      url: https://kymaros.io
  artifacthub.io/screenshots: |
    - title: Dashboard Overview
      url: https://kymaros.io/screenshots/dashboard-overview.png
    - title: Report Detail
      url: https://kymaros.io/screenshots/report-detail.png
  artifacthub.io/changes: |
    - kind: added
      description: Global Slack/webhook notification defaults via Helm values
    - kind: fixed
      description: Early-failure paths now trigger notifications
    - kind: security
      description: Fix CVE-2026-33186 (grpc) and CVE-2026-24051 (otel/sdk)
    - kind: security
      description: Timing-safe bearer token comparison (crypto/subtle)
    - kind: security
      description: Request body size limit (1 MiB) on POST/PUT endpoints
    - kind: security
      description: CORS restricted to explicit KYMAROS_CORS_ORIGIN only
    - kind: security
      description: Remove unused RBAC update verb on deployments/statefulsets
