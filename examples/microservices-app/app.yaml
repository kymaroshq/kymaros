---
# ============================================================
# Namespace: kymaros-demo-ms-db — PostgreSQL database
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: kymaros-demo-ms-db
  labels:
    app: postgres
spec:
  ports:
    - port: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: kymaros-demo-ms-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: app
            - name: POSTGRES_USER
              value: app
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: postgres-password
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "app"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
# ============================================================
# Namespace: kymaros-demo-ms-cache — Redis cache
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: kymaros-demo-ms-cache
  labels:
    app: redis
spec:
  ports:
    - port: 6379
  selector:
    app: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: kymaros-demo-ms-cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
---
# ============================================================
# Namespace: kymaros-demo-ms-api — API gateway (nginx)
# ============================================================

# ConfigMap with cross-namespace service URLs
apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: kymaros-demo-ms-api
data:
  DATABASE_HOST: "postgres.kymaros-demo-ms-db.svc.cluster.local"
  DATABASE_PORT: "5432"
  CACHE_HOST: "redis.kymaros-demo-ms-cache.svc.cluster.local"
  CACHE_PORT: "6379"
  # nginx config that proxies /healthz to a simple 200 response
  nginx.conf: |
    server {
      listen 80;
      location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
      }
      location / {
        return 200 'microservices-app';
        add_header Content-Type text/plain;
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: kymaros-demo-ms-api
  labels:
    app: api
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: kymaros-demo-ms-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: api-config
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: nginx-conf
          configMap:
            name: api-config
            items:
              - key: nginx.conf
                path: nginx.conf
