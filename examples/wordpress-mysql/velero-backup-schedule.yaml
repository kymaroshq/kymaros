apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: wordpress-demo
  namespace: velero
spec:
  # Daily at 2:00 AM UTC
  schedule: "0 2 * * *"
  template:
    includedNamespaces:
      - kymaros-demo-wordpress
    # Include PVCs for MySQL data
    defaultVolumesToFsBackup: true
    ttl: 168h0m0s  # Keep backups for 7 days
