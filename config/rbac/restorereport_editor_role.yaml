# This rule is not used by the project kymaros itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the restore.kymaros.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kymaros
    app.kubernetes.io/managed-by: kustomize
  name: restorereport-editor-role
rules:
- apiGroups:
  - restore.kymaros.io
  resources:
  - restorereports
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - restore.kymaros.io
  resources:
  - restorereports/status
  verbs:
  - get
